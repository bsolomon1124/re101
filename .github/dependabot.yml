version: 2

updates:
  # Python dependencies managed via uv (reads pyproject.toml / uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-dev-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"

  # GitHub Actions — pinned by SHA, so updates land as commit-SHA bumps
  # with the original tag preserved in a trailing comment.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
